orchestrator:
  # 任务调度配置
  scheduler:
    max_concurrent_tasks: 10
    polling_interval: 30  # 秒
    enable_hooks: true
    
  # 复杂度判断配置  
  complexity:
    auto_detect: true
    manual_override: true
    confirmation_required: true
    
    # L1简单任务配置
    l1_config:
      max_tokens: 1000
      timeout: 300  # 5分钟
      direct_execution: true
      
    # L2单步任务配置  
    l2_config:
      max_tokens: 5000
      timeout: 1800  # 30分钟
      specialist_agents: ["research-analyst", "doc-engineer", "code-reviewer"]
      
    # L3复杂任务配置
    l3_config:
      max_tokens: 20000
      timeout: 7200  # 2小时
      multi_agent_collaboration: true
      openspec_workflow: true
      stage_confirmation: true

  # Agent池配置
  agent_pool:
    max_agents: 20
    health_check_interval: 60
    auto_scaling: true
    
  # 状态同步配置
  sync:
    bitable_sync_interval: 30
    enable_real_time_hooks: true
    retry_attempts: 3
    retry_backoff: 2
    
  # 通知配置
  notifications:
    task_created: true
    status_changed: true
    task_completed: true
    task_failed: true
    approval_required: true
    
# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/orchestrator.log"
  max_size: "10MB"
  backup_count: 5

# 安全配置
security:
  enable_auth: false  # 开发阶段关闭
  api_key_required: false
  rate_limiting: true
  max_requests_per_minute: 100